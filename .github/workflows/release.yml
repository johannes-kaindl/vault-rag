name: Release

# Läuft beim Push eines SemVer-Tags (Obsidian-Konvention: ohne v-Präfix, z.B. 0.3.4).
on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write      # Release anlegen
  id-token: write      # Build-Provenance-Attestation (OIDC)
  attestations: write  # Attestation in GitHub schreiben

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      # Qualitäts-Gate — nur grüner Code wird released
      - run: npm run typecheck
      - run: npm test
      - run: npm run lint
      - run: npm run build

      # Kryptografischer Provenance-Nachweis für die Release-Assets (per Datei-Digest).
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "Built and attested by CI. See [CHANGELOG](https://github.com/${GITHUB_REPOSITORY}/blob/main/CHANGELOG.md)." \
            main.js manifest.json styles.css
